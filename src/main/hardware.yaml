i2c:
  - id: internal_i2c
    sda: GPIO11
    scl: GPIO12
  - id: external_i2c
    sda: GPIO13
    scl: GPIO15

rc522_i2c:
  - id: nfc_reader
    i2c_id: internal_i2c
    address: 0x28

switch:
  # M5Dial V1.1 battery power hold. GPIO46 must stay HIGH after WAKE,
  # otherwise the device immediately returns to sleep on battery-only power.
  - platform: gpio
    pin: GPIO46
    id: power_hold
    internal: true
    restore_mode: ALWAYS_ON

output:
  - platform: ledc
    pin: GPIO3
    id: buzzer
  - platform: ledc
    pin: GPIO9
    id: backlight_output

rtttl:
  output: buzzer

spi:
  id: spi_bus
  mosi_pin: GPIO5
  clk_pin: GPIO6

