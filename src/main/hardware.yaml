display:
  - platform: mipi_spi
    id: round_display
    model: GC9A01A
    cs_pin: GPIO7
    reset_pin: GPIO8
    dc_pin: GPIO4
    invert_colors: true
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: false

globals:
  - id: swipe_start_x
    type: int
    initial_value: '-1'
  - id: swipe_cur_x
    type: int
    initial_value: '0'
  - id: swipe_start_y
    type: int
    initial_value: '0'
  - id: swipe_cur_y
    type: int
    initial_value: '0'

touchscreen:
  - platform: ft5x06
    id: touch
    i2c_id: internal_i2c
    address: 0x38
    interrupt_pin: GPIO14
    on_touch:
      - lambda: |-
          if (id(swipe_start_x) < 0) {
            id(swipe_start_x) = touch.x;
            id(swipe_start_y) = touch.y;
          }
          id(swipe_cur_x) = touch.x;
          id(swipe_cur_y) = touch.y;
    on_release:
      - lambda: |-
          int dx = id(swipe_cur_x) - id(swipe_start_x);
          int dy = id(swipe_cur_y) - id(swipe_start_y);
          id(swipe_start_x) = -1;
          if (abs(dx) < 50 || abs(dy) > abs(dx)) return;
          bool on_clock = !id(in_menu) && !id(in_light) && !id(in_air)
                       && !id(in_music) && !id(in_timer)
                       && !id(in_colorpicker);
          if (on_clock && dx < 0) {
            id(open_menu).execute();
          } else if (id(in_menu) && (dx > 0 || dx < 0)) {
            id(close_menu).execute();
          }

light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_output
    id: display_backlight
    restore_mode: ALWAYS_ON

  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO2
    num_leds: 30
    chipset: sk6812
    name: "My Light"
    id: led_strip
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s
    effects:
      - addressable_lambda:
          name: "Atmosphere Flow Aurora"
          update_interval: 33ms
          lambda: |-
            static float phase = 0.0f;
            phase += 0.010f;
            if (phase >= 1.0f) phase -= 1.0f;
            const int n = it.size();
            const float denom = (n > 1) ? (float)(n - 1) : 1.0f;
            for (int i = 0; i < n; i++) {
              float x = (i / denom) + phase;
              if (x >= 1.0f) x -= 1.0f;
              float w1 = 0.5f + 0.5f * sinf(6.28318f * (x + 0.00f));
              float w2 = 0.5f + 0.5f * sinf(6.28318f * (x + 0.33f));
              float w3 = 0.5f + 0.5f * sinf(6.28318f * (x + 0.66f));
              uint8_t r = (uint8_t)(20.0f + 75.0f * w1);
              uint8_t g = (uint8_t)(30.0f + 120.0f * w2);
              uint8_t b = (uint8_t)(90.0f + 140.0f * w3);
              it[i] = Color(r, g, b);
            }
      - addressable_lambda:
