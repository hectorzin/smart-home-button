        - label:
            id: lbl_temp
            align: CENTER
            x: -58
            y: 31
            text_font: font_val
            text_color: col_text_temp
            text: "--"
        - label:
            id: lbl_humidity
            align: CENTER
            x: 0
            y: 31
            text_font: font_val
            text_color: col_text_hum
            text: "--"
        - label:
            id: lbl_uv
            align: CENTER
            x: 58
            y: 31
            text_font: font_val
            text_color: col_text_aqi
            text: "--"

        - obj:
            align: CENTER
