  #         condition:
  #           lambda: 'return id(in_menu);'
  #         then:
  #           - script.execute: close_menu
  #     - if:
  #         condition:
  #           lambda: 'return id(in_light) || id(in_colorpicker);'
  #         then:
  #           - script.execute: close_light
  #     - if:
