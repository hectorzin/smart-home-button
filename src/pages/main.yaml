lvgl:
  pages:
    - id: page_clock
      bg_color: col_bg
      bg_opa: COVER
      scrollbar_mode: "OFF"
      widgets:

        - arc:
            align: CENTER
            width: 228
            height: 228
            arc_color: col_ring_track
            arc_width: 2
            arc_opa: COVER
            arc_rounded: true
            indicator:
              arc_color: col_ring_track
              arc_width: 2
              arc_opa: COVER
            start_angle: 0
            end_angle: 360
            value: 100
            min_value: 0
            max_value: 100
            adjustable: false
            knob:
              bg_opa: TRANSP
              border_width: 0
              width: 0
              height: 0

        - arc:
            id: arc_minute
            align: CENTER
            width: 228
            height: 228
            arc_color: col_ring_track
            arc_width: 2
            arc_opa: TRANSP
            arc_rounded: true
            rotation: 270
            indicator:
              arc_color: col_ring_progress
              arc_width: 2
              arc_opa: COVER
              arc_rounded: true
            start_angle: 0
            end_angle: 360
            value: 24
            min_value: 0
            max_value: 60
            adjustable: false
            knob:
              bg_opa: TRANSP
              border_width: 0
              width: 0
              height: 0

        - label:
            id: lbl_clock
            align: CENTER
            y: -50
            text_font: font_clock
            text_color: col_text_pri
            text: "00:00"

        - label:
            id: lbl_date
            align: CENTER
            y: -7
            text_font: font_date
            text_color: col_text_lbl
            text: "000 0/0"

        - label:
            align: CENTER
            x: -58
            y: 13
            text_font: font_lbl
            text_color: col_text_temp
            text: "TEMP"
        - label:
            align: CENTER
            x: 0
            y: 13
            text_font: font_lbl
            text_color: col_text_hum
            text: "HUM"
        - label:
            align: CENTER
            x: 58
            y: 13
            text_font: font_lbl
