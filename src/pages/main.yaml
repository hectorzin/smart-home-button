
font:
  - file: "gfonts://DM+Sans"
    id: font_clock
    size: 60
    bpp: 4
    glyphs: "0123456789: "

  - file: "gfonts://DM+Sans"
    id: font_date
    size: 14
    bpp: 4
    glyphs: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 /.-"

  - file: "gfonts://DM+Sans"
    id: font_val
    size: 18
    bpp: 4
    glyphs: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .-%°/"

  - file: "gfonts://DM+Sans"
    id: font_val_s
    size: 15
    bpp: 4
    glyphs: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .-%°/"

  - file:
      family: DM+Sans
      weight: 700
      type: gfonts
    id: font_lbl
    size: 11
    bpp: 4
    glyphs: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 ."

  - file:
      family: DM+Sans
      weight: 700
      type: gfonts
    id: font_lbl_s
    size: 9
    bpp: 4
    glyphs: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 ."

color:
  - id: col_ring_track
    hex: "182033"    # restrained dark ring track
  - id: col_ring_progress
    hex: "5ECAD3"    # muted cyan progress
  - id: col_dot
    hex: "7FB8C2"    # soft minute dot
  - id: col_text_lbl
    hex: "8EA0B8"    # secondary labels
  - id: col_text_temp
    hex: "E8A35B"    # warm temperature accent
  - id: col_text_hum
    hex: "73B7D8"    # calm humidity accent
  - id: col_text_aqi
    hex: "7CCB9A"    # softened AQI accent
  - id: col_text_pres
    hex: "B7A7D9"    # muted pressure accent
  - id: col_text_wind
    hex: "D8C16A"    # restrained wind accent
  - id: col_divider
    hex: "202A3C"

time:
  - platform: pcf8563
    id: rtctime
    i2c_id: internal_i2c
    address: 0x51
    timezone: ${timezone}
    update_interval: never
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lvgl.label.update:
              id: lbl_clock
              text: !lambda |-
                static char buf[6];
                auto t = id(rtctime).now();
                sprintf(buf, "%02d:%02d", t.hour, t.minute);
                return buf;
          - lvgl.label.update:
              id: lbl_date
              text: !lambda |-
                static char buf[20];
                auto t = id(rtctime).now();
                const char* days[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
                const char* day = (t.day_of_week >= 1 && t.day_of_week <= 7) ? days[t.day_of_week - 1] : "---";
                sprintf(buf, "%s  %02d/%02d", day, t.month, t.day_of_month);
                return buf;
          - lvgl.arc.update:
              id: arc_minute
              value: !lambda "return id(rtctime).now().minute;"

  - platform: homeassistant
    id: esptime
    timezone: ${timezone}
    on_time_sync:
      then:
        - pcf8563.write_time:

script:
  - id: dial_back
    then:
      - lambda: |-
          if (id(in_light_selector)) {
            id(close_light_selector).execute();
            return;
          }
          if (id(in_menu)) {
            id(close_menu).execute();
            return;
          }
          if (id(in_light)) {
            if (id(dial_lights_id).light_count() > 1) {
              id(in_light) = false;
              id(open_light_selector).execute();
            } else {
              id(close_light).execute();
            }
            return;
          }
          if (id(in_colorpicker)) {
            id(close_light).execute();
            return;
          }
          if (id(in_air)) {
            id(close_air).execute();
            return;
          }
          if (id(in_music)) {
            id(in_music) = false;
            id(open_menu).execute();
            return;
          }
          if (id(in_timer)) {
            id(close_timer).execute();
            return;
          }
          id(open_menu).execute();

sensor:
  - platform: rotary_encoder
    id: encoder
    pin_a:
      number: GPIO40
      mode: INPUT_PULLUP
    pin_b:
      number: GPIO41
      mode: INPUT_PULLUP
    resolution: 4
    on_clockwise:
      - if:
          condition:
            lambda: 'return id(in_light_selector);'
          then:
            - lambda: |-
                id(dial_lights_id).select_next();
                id(refresh_light_selector).execute();
      - if:
          condition:
            lambda: 'return id(in_colorpicker);'
          then:
            - script.execute: light_hue_up
      - if:
          condition:
            lambda: 'return id(in_light) && !id(in_colorpicker) && !id(in_menu);'
          then:
            - script.execute: light_brightness_up
      - if:
          condition:
            lambda: 'return id(in_air) && !id(in_menu);'
          then:
            - lambda: |-
                id(air_encoder_step_accum) += 1;
                if (id(air_encoder_step_accum) >= 4) {
                  id(air_encoder_step_accum) = 0;
                  if (id(air_mode) == 0) {
                    id(air_temp_up).execute();
                  } else {
                    id(air_fan_up).execute();
                  }
                }
      - if:
          condition:
            lambda: 'return id(in_music);'
          then:
            - script.execute: music_volume_up
      - if:
          condition:
            lambda: 'return id(in_menu);'
          then:
            - script.execute: menu_scroll_down
      - if:
          condition:
            lambda: 'return id(in_timer);'
          then:
            - script.execute: timer_encoder_up
    on_anticlockwise:
      - if:
          condition:
            lambda: 'return id(in_light_selector);'
          then:
            - lambda: |-
                id(dial_lights_id).select_previous();
                id(refresh_light_selector).execute();
      - if:
          condition:
            lambda: 'return id(in_colorpicker);'
          then:
            - script.execute: light_hue_down
      - if:
          condition:
            lambda: 'return id(in_light) && !id(in_colorpicker) && !id(in_menu);'
          then:
            - script.execute: light_brightness_down
      - if:
          condition:
            lambda: 'return id(in_air) && !id(in_menu);'
          then:
            - lambda: |-
                id(air_encoder_step_accum) -= 1;
                if (id(air_encoder_step_accum) <= -4) {
                  id(air_encoder_step_accum) = 0;
                  if (id(air_mode) == 0) {
                    id(air_temp_down).execute();
                  } else {
                    id(air_fan_down).execute();
                  }
                }
      - if:
          condition:
            lambda: 'return id(in_music);'
          then:
            - script.execute: music_volume_down
      - if:
          condition:
            lambda: 'return id(in_menu);'
          then:
            - script.execute: menu_scroll_up
      - if:
          condition:
            lambda: 'return id(in_timer);'
          then:
            - script.execute: timer_encoder_down

  - platform: homeassistant
    id: ha_temperature
    entity_id: ${weather_entity}
    attribute: temperature
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_temp
            text: !lambda |-
              static char buf[8];
              sprintf(buf, "%.0f\xc2\xb0", x);
              return buf;

  - platform: homeassistant
    id: ha_humidity
    entity_id: ${weather_entity}
    attribute: humidity
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_humidity
            text: !lambda |-
              static char buf[8];
              sprintf(buf, "%.0f%%", x);
              return buf;

  - platform: homeassistant
    id: ha_aqi
    entity_id: ${weather_entity}
    attribute: aqi
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_uv
            text: !lambda |-
              static char buf[8];
              sprintf(buf, "%.0f", x);
              return buf;

  - platform: homeassistant
    id: ha_pressure
    entity_id: ${weather_entity}
    attribute: pressure
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_pressure
            text: !lambda |-
              static char buf[12];
              sprintf(buf, "%.0fhPa", x);
              return buf;

  - platform: homeassistant
    id: ha_wind
    entity_id: ${weather_entity}
    attribute: wind_speed
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_cloud
            text: !lambda |-
              static char buf[12];
              sprintf(buf, "%.0fkm/h", x);
              return buf;

binary_sensor:
  - platform: gpio
    name: Button
    id: front_button
    pin:
      number: GPIO42
      inverted: true
      mode:
        input: true
        pullup: true
    on_multi_click:
      - timing:
          - ON for at most 500ms
          - OFF for at most 500ms
          - ON for at most 500ms
          - OFF for at least 40ms
        invalid_cooldown: 150ms
        then:
          - if:
              condition:
                lambda: 'return !id(button_debounce);'
              then:
                - globals.set: {id: button_debounce, value: 'true'}
                - script.execute: dial_back
                - delay: 250ms
                - globals.set: {id: button_debounce, value: 'false'}
      - timing:
          - ON for 50ms to 500ms
          - OFF for at least 520ms
        invalid_cooldown: 150ms
        then:
          - if:
              condition:
                lambda: 'return id(in_menu) && !id(button_debounce);'
              then:
                - globals.set: {id: button_debounce, value: 'true'}
                - script.execute: menu_confirm
                - delay: 250ms
                - globals.set: {id: button_debounce, value: 'false'}
          - if:
              condition:
                lambda: 'return id(in_light_selector) && !id(button_debounce);'
              then:
                - globals.set: {id: button_debounce, value: 'true'}
                - script.execute: light_selector_confirm
                - delay: 250ms
                - globals.set: {id: button_debounce, value: 'false'}
          - if:
              condition:
                lambda: 'return id(in_timer) && !id(button_debounce);'
              then:
                - globals.set: {id: button_debounce, value: 'true'}
                - script.execute: timer_toggle
                - delay: 250ms
                - globals.set: {id: button_debounce, value: 'false'}
  # M5Dial V1.1 uses GPIO46 as HOLD for battery power retention.
  # Keep this old back-button mapping commented; enabling it will conflict with
  # src/main/hardware.yaml:power_hold and battery-only boot will turn off again.
