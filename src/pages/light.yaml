globals:
  - id: light_brightness
    type: int
    initial_value: '75'
  - id: in_light
    type: bool
    initial_value: 'false'
  - id: light_on
    type: bool
    initial_value: 'false'
  - id: light_color_h
    type: int
    initial_value: '252'
  - id: light_color_h_prev
    type: int
    initial_value: '252'
  - id: in_colorpicker
    type: bool
    initial_value: 'false'
  - id: light_color_r
    type: int
    initial_value: '169'
  - id: light_color_g
    type: int
    initial_value: '143'
  - id: light_color_b
    type: int
    initial_value: '255'
  - id: light_supports_rgb
    type: bool
    initial_value: 'false'
  - id: light_supports_color_temp
    type: bool
    initial_value: 'false'
  - id: light_color_picker_mode
    type: int
    initial_value: '0'
  - id: light_white_kelvin
    type: int
    initial_value: '4000'
  - id: light_white_kelvin_min
    type: int
    initial_value: '2000'
  - id: light_white_kelvin_max
    type: int
    initial_value: '6500'
  - id: light_white_kelvin_prev
    type: int
    initial_value: '4000'
  - id: light_ha_color_mode_is_temp
    type: bool
    initial_value: 'false'
  - id: light_supports_brightness
    type: bool
    initial_value: 'false'
  - id: light_user_adjusting
    type: bool
    initial_value: 'false'
  - id: light_last_ha_brightness
    type: int
    initial_value: '-1'
  - id: light_requested_brightness
    type: int
    initial_value: '75'
  - id: light_brightness_action_sent
    type: bool
    initial_value: 'false'
  - id: light_ha_brightness_received_after_send
    type: bool
    initial_value: 'false'
  - id: light_multilight_active
    type: bool
    restore_value: no
    initial_value: 'false'

text_sensor:
  - platform: homeassistant
    id: ha_light_state
    entity_id: ${light_entity}
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !id(light_multilight_active);'
          then:
            - lambda: |-
                id(light_on) = x == "on";
            - script.execute: refresh_light_arc

  - platform: homeassistant
    id: ha_light_rgb_color
    entity_id: ${light_entity}
    attribute: rgb_color
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !id(light_multilight_active);'
          then:
            - lambda: |-
                int r, g, b;
                if (sscanf(x.c_str(), "[%d, %d, %d]", &r, &g, &b) != 3) return;
                id(light_color_r) = std::max(0, std::min(255, r));
                id(light_color_g) = std::max(0, std::min(255, g));
                id(light_color_b) = std::max(0, std::min(255, b));
                float rf = id(light_color_r) / 255.0f;
                float gf = id(light_color_g) / 255.0f;
                float bf = id(light_color_b) / 255.0f;
                float maxc = std::max(rf, std::max(gf, bf));
                float minc = std::min(rf, std::min(gf, bf));
                float delta = maxc - minc;
                float hue = 0.0f;
                if (delta > 0.0001f) {
                  if (maxc == rf) hue = 60.0f * fmodf((gf - bf) / delta, 6.0f);
                  else if (maxc == gf) hue = 60.0f * (((bf - rf) / delta) + 2.0f);
                  else hue = 60.0f * (((rf - gf) / delta) + 4.0f);
                }
                if (hue < 0.0f) hue += 360.0f;
                id(light_color_h) = (int)(hue + 0.5f) % 360;
            - script.execute: refresh_light_arc

  - platform: homeassistant
    id: ha_light_color_modes
    entity_id: ${light_entity}
    attribute: supported_color_modes
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !id(light_multilight_active);'
          then:
            - lambda: |-
                id(light_supports_rgb) = x.find("rgb") != std::string::npos;
                id(light_supports_color_temp) = x.find("color_temp") != std::string::npos;
                id(light_supports_brightness) =
                    id(light_supports_rgb) || x.find("brightness") != std::string::npos ||
                    x.find("color_temp") != std::string::npos || x.find("hs") != std::string::npos ||
                    x.find("xy") != std::string::npos;
                ESP_LOGI("light_ha", "entity=%s supported_color_modes=%s brightness=%s rgb=%s ct=%s",
                         "${light_entity}", x.c_str(),
                         id(light_supports_brightness) ? "yes" : "no",
                         id(light_supports_rgb) ? "yes" : "no",
                         id(light_supports_color_temp) ? "yes" : "no");
            - script.execute: refresh_light_arc

  - platform: homeassistant
    id: ha_light_color_mode
    entity_id: ${light_entity}
    attribute: color_mode
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !id(light_multilight_active);'
          then:
            - lambda: |-
                id(light_ha_color_mode_is_temp) = x == "color_temp";
            - script.execute: refresh_light_arc

sensor:
  - platform: homeassistant
    id: ha_light_color_temp_kelvin
    entity_id: ${light_entity}
    attribute: color_temp_kelvin
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !id(light_multilight_active) && !id(in_colorpicker);'
          then:
            - lambda: |-
                if (x != x || x <= 0.0f) return;
                id(light_white_kelvin) = static_cast<int>(x + 0.5f);

  - platform: homeassistant
    id: ha_light_min_color_temp_kelvin
    entity_id: ${light_entity}
    attribute: min_color_temp_kelvin
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !id(light_multilight_active);'
          then:
            - lambda: |-
                if (x != x || x <= 0.0f) return;
                id(light_white_kelvin_min) = static_cast<int>(x + 0.5f);

  - platform: homeassistant
    id: ha_light_max_color_temp_kelvin
    entity_id: ${light_entity}
    attribute: max_color_temp_kelvin
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !id(light_multilight_active);'
          then:
            - lambda: |-
                if (x != x || x <= 0.0f) return;
                id(light_white_kelvin_max) = static_cast<int>(x + 0.5f);

  - platform: homeassistant
    id: ha_light_brightness
    entity_id: ${light_entity}
    attribute: brightness
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !id(light_multilight_active);'
          then:
            - lambda: |-
                if (x != x) return;
                int brightness = (int)(x * 100.0f / 255.0f + 0.5f);
                id(light_last_ha_brightness) = std::max(0, std::min(100, brightness));
                if (id(light_user_adjusting)) {
                  if (id(light_brightness_action_sent)) {
                    id(light_ha_brightness_received_after_send) = true;
                    ESP_LOGI("light_ha", "stored HA brightness=%d after local send",
                             id(light_last_ha_brightness));
                  } else {
                    ESP_LOGI("light_ha", "ignored pre-send HA brightness=%d while local adjustment is active",
                             id(light_last_ha_brightness));
                  }
                  return;
                }
                id(light_brightness) = id(light_last_ha_brightness);
            - if:
                condition:
                  lambda: 'return !id(light_user_adjusting);'
                then:
                  - script.execute: refresh_light_arc

script:
  - id: send_light_turn_on
    then:
      - if:
          condition:
            lambda: 'return id(light_supports_rgb);'
          then:
            - homeassistant.action:
                action: light.turn_on
                data_template:
                  entity_id: "{{ target_entity }}"
                  brightness_pct: "{{ brightness | int }}"
                  rgb_color: "[{{ red | int }}, {{ green | int }}, {{ blue | int }}]"
                variables:
                  target_entity: !lambda |-
                    if (id(light_multilight_active)) {
                      return id(dial_lights_id).active_entity_id();
                    }
                    return std::string("${light_entity}");
                  brightness: !lambda "return id(light_brightness);"
                  red: !lambda "return id(light_color_r);"
                  green: !lambda "return id(light_color_g);"
                  blue: !lambda "return id(light_color_b);"
          else:
            - if:
                condition:
                  lambda: 'return id(light_supports_brightness);'
                then:
                  - homeassistant.action:
                      action: light.turn_on
                      data_template:
                        entity_id: "{{ target_entity }}"
                        brightness_pct: "{{ brightness | int }}"
                      variables:
                        target_entity: !lambda |-
                          if (id(light_multilight_active)) {
                            return id(dial_lights_id).active_entity_id();
                          }
                          return std::string("${light_entity}");
                        brightness: !lambda "return id(light_brightness);"
                else:
                  - homeassistant.action:
                      action: light.turn_on
                      data_template:
                        entity_id: "{{ target_entity }}"
                      variables:
                        target_entity: !lambda |-
                          if (id(light_multilight_active)) {
                            return id(dial_lights_id).active_entity_id();
                          }
                          return std::string("${light_entity}");

  - id: send_light_turn_off
    then:
      - homeassistant.action:
          action: light.turn_off
          data_template:
            entity_id: "{{ target_entity }}"
          variables:
            target_entity: !lambda |-
              if (id(light_multilight_active)) {
                return id(dial_lights_id).active_entity_id();
              }
              return std::string("${light_entity}");

  - id: send_light_color_temp
    then:
      - if:
          condition:
            lambda: 'return id(light_supports_brightness);'
          then:
            - homeassistant.action:
                action: light.turn_on
                data_template:
                  entity_id: "{{ target_entity }}"
                  color_temp_kelvin: "{{ kelvin | int }}"
                  brightness_pct: "{{ brightness | int }}"
                variables:
                  target_entity: !lambda |-
                    if (id(light_multilight_active)) {
                      return id(dial_lights_id).active_entity_id();
                    }
                    return std::string("${light_entity}");
                  kelvin: !lambda "return id(light_white_kelvin);"
                  brightness: !lambda "return id(light_brightness);"
          else:
            - homeassistant.action:
                action: light.turn_on
                data_template:
                  entity_id: "{{ target_entity }}"
                  color_temp_kelvin: "{{ kelvin | int }}"
                variables:
                  target_entity: !lambda |-
                    if (id(light_multilight_active)) {
                      return id(dial_lights_id).active_entity_id();
                    }
                    return std::string("${light_entity}");
                  kelvin: !lambda "return id(light_white_kelvin);"

  - id: queue_light_brightness
    mode: restart
    then:
      - delay: 200ms
      - if:
          condition:
            lambda: 'return id(light_on) && id(light_supports_brightness);'
          then:
            - lambda: |-
                id(light_brightness_action_sent) = true;
            - script.execute: send_light_turn_on
      - delay: 600ms
      - lambda: |-
          id(light_user_adjusting) = false;
          int requested = id(light_requested_brightness);
          int received = id(light_last_ha_brightness);
          bool confirmed = id(light_ha_brightness_received_after_send) &&
                           received >= 0 && abs(received - requested) <= 2;
          if (confirmed) {
            id(light_brightness) = received;
            ESP_LOGI("light_ha", "reconciled brightness=%d from Home Assistant (requested=%d)",
                     id(light_brightness), requested);
          } else {
            id(light_brightness) = requested;
            ESP_LOGI("light_ha", "kept requested brightness=%d; HA value=%d was not a matching confirmation",
                     requested, received);
          }
          id(light_brightness_action_sent) = false;
          id(light_ha_brightness_received_after_send) = false;
      - script.execute: refresh_light_arc

  - id: open_light
    then:
      - globals.set: {id: in_light, value: 'true'}
      - globals.set: {id: in_menu, value: 'false'}
      - lvgl.page.show:
          id: page_light
          animation: MOVE_LEFT

  - id: close_light
    then:
      - globals.set: {id: in_light, value: 'false'}
      - globals.set: {id: in_colorpicker, value: 'false'}
      - globals.set: {id: light_multilight_active, value: 'false'}
      - script.execute: open_menu

  - id: toggle_light_onoff
    then:
      - lambda: |-
          id(light_on) = !id(light_on);
          lv_color_t col = id(light_on)
            ? lv_color_make(id(light_color_r), id(light_color_g), id(light_color_b))
            : lv_color_hex(0x262626);
          lv_obj_set_style_border_color(id(btn_dengguang), col, LV_STATE_DEFAULT);
          lv_obj_set_style_shadow_color(id(btn_dengguang), col, LV_STATE_DEFAULT);
      - if:
          condition:
            lambda: 'return id(light_on);'
          then:
            - script.execute: send_light_turn_on
          else:
            - script.execute: send_light_turn_off
      - script.execute: refresh_light_arc

  - id: open_colorpicker
    then:
      - lambda: |-
          id(light_color_h_prev) = id(light_color_h);
          id(light_white_kelvin_prev) = id(light_white_kelvin);

          bool rgb = id(light_supports_rgb);
          bool ct = id(light_supports_color_temp);
          bool mode_is_temp = id(light_ha_color_mode_is_temp);

          if (id(light_multilight_active)) {
            rgb = id(dial_lights_id).active_supports_rgb();
            ct = id(dial_lights_id).active_supports_color_temp();
            id(light_supports_rgb) = rgb;
            id(light_supports_color_temp) = ct;
            if (id(dial_lights_id).active_color_mode_valid()) {
              mode_is_temp = id(dial_lights_id).active_is_color_temp_mode();
            }
            int min_k = id(dial_lights_id).active_min_color_temp_kelvin();
            int max_k = id(dial_lights_id).active_max_color_temp_kelvin();
            if (min_k > max_k) { int tmp = min_k; min_k = max_k; max_k = tmp; }
            if (max_k - min_k < 1) max_k = min_k + 1;
            id(light_white_kelvin_min) = min_k;
            id(light_white_kelvin_max) = max_k;
            if (id(dial_lights_id).active_color_temp_valid()) {
              int k = id(dial_lights_id).active_color_temp_kelvin();
              if (k < min_k) k = min_k;
              if (k > max_k) k = max_k;
              id(light_white_kelvin) = k;
            }
          } else {
            int min_k = id(light_white_kelvin_min);
            int max_k = id(light_white_kelvin_max);
            if (min_k <= 0) min_k = 2000;
            if (max_k <= 0) max_k = 6500;
            if (min_k > max_k) { int tmp = min_k; min_k = max_k; max_k = tmp; }
            if (max_k - min_k < 1) max_k = min_k + 1;
            id(light_white_kelvin_min) = min_k;
            id(light_white_kelvin_max) = max_k;
            int k = id(light_white_kelvin);
            if (k < min_k) k = min_k;
            if (k > max_k) k = max_k;
            id(light_white_kelvin) = k;
          }

          if (rgb && ct) {
            id(light_color_picker_mode) = mode_is_temp ? 1 : 0;
          } else if (rgb) {
            id(light_color_picker_mode) = 0;
          } else {
            id(light_color_picker_mode) = 1;
          }

          id(light_white_kelvin_prev) = id(light_white_kelvin);
      - globals.set: {id: in_light, value: 'false'}
      - globals.set: {id: in_colorpicker, value: 'true'}
      - script.execute: refresh_color_preview
      - lvgl.page.show:
          id: page_colorpicker
          animation: MOVE_LEFT

  - id: close_colorpicker
    then:
      - lambda: |-
          id(light_color_h) = id(light_color_h_prev);
          id(light_white_kelvin) = id(light_white_kelvin_prev);
      - globals.set: {id: in_colorpicker, value: 'false'}
      - globals.set: {id: in_light, value: 'true'}
      - lvgl.page.show:
          id: page_light
          animation: MOVE_RIGHT

  - id: toggle_color_picker_mode
    then:
      - lambda: |-
          if (!id(light_supports_rgb) || !id(light_supports_color_temp)) return;
          id(light_color_picker_mode) = id(light_color_picker_mode) == 0 ? 1 : 0;
      - script.execute: refresh_color_preview

  - id: confirm_light_color
    then:
      - if:
          condition:
            lambda: 'return id(light_color_picker_mode) == 0;'
          then:
            - lambda: |-
                int h = id(light_color_h);
                int hi = (h / 60) % 6;
                float f = h / 60.0f - (int)(h / 60.0f);
                int q = (int)(255.0f * (1.0f - f));
                int t = (int)(255.0f * f);
                int r8, g8, b8;
                switch (hi) {
                  case 0: r8=255; g8=t;   b8=0;   break;
                  case 1: r8=q;   g8=255; b8=0;   break;
                  case 2: r8=0;   g8=255; b8=t;   break;
                  case 3: r8=0;   g8=q;   b8=255; break;
                  case 4: r8=t;   g8=0;   b8=255; break;
                  default: r8=255; g8=0;  b8=q;   break;
                }
                id(light_color_r) = r8;
                id(light_color_g) = g8;
                id(light_color_b) = b8;
            - globals.set: {id: in_colorpicker, value: 'false'}
            - globals.set: {id: in_light, value: 'true'}
            - script.execute: refresh_light_arc
            - if:
                condition:
                  lambda: 'return id(light_on) && id(light_supports_rgb);'
                then:
                  - script.execute: send_light_turn_on
            - lvgl.page.show:
                id: page_light
                animation: MOVE_RIGHT
          else:
            - lambda: |-
                int kelvin = id(light_white_kelvin);
                float temp = kelvin / 100.0f;
                int r8, g8, b8;
                if (temp <= 66.0f) {
                  r8 = 255;
                  g8 = (int)(99.4708025861f * logf(temp) - 161.1195681661f + 0.5f);
                  b8 = temp <= 19.0f ? 0 : (int)(138.5177312231f * logf(temp - 10.0f) - 305.0447927307f + 0.5f);
                } else {
                  r8 = (int)(329.698727446f * powf(temp - 60.0f, -0.1332047592f) + 0.5f);
                  g8 = (int)(288.1221695283f * powf(temp - 60.0f, -0.0755148492f) + 0.5f);
                  b8 = 255;
                }
                id(light_color_r) = std::max(0, std::min(255, r8));
                id(light_color_g) = std::max(0, std::min(255, g8));
                id(light_color_b) = std::max(0, std::min(255, b8));
            - globals.set: {id: in_colorpicker, value: 'false'}
            - globals.set: {id: in_light, value: 'true'}
            - script.execute: refresh_light_arc
            - if:
                condition:
                  lambda: 'return id(light_on) && id(light_supports_color_temp);'
                then:
                  - script.execute: send_light_color_temp
            - lvgl.page.show:
                id: page_light
                animation: MOVE_RIGHT

  - id: light_hue_up
    then:
      - lambda: |-
          int h = id(light_color_h) + 3;
          if (h >= 360) h -= 360;
          id(light_color_h) = h;
      - script.execute: refresh_color_preview

  - id: light_hue_down
    then:
      - lambda: |-
          int h = id(light_color_h) - 3;
          if (h < 0) h += 360;
          id(light_color_h) = h;
      - script.execute: refresh_color_preview

  - id: light_kelvin_up
    then:
      - lambda: |-
          int min_k = id(light_white_kelvin_min);
          int max_k = id(light_white_kelvin_max);
          if (min_k > max_k) { int tmp = min_k; min_k = max_k; max_k = tmp; }
          if (max_k - min_k < 1) max_k = min_k + 1;
          int step = (max_k - min_k + 119) / 120;
          if (step < 1) step = 1;
          int k = id(light_white_kelvin);
          if (k >= max_k) {
            id(light_white_kelvin) = min_k;
          } else {
            k += step;
            if (k > max_k) k = max_k;
            id(light_white_kelvin) = k;
          }
      - script.execute: refresh_color_preview

  - id: light_kelvin_down
    then:
      - lambda: |-
          int min_k = id(light_white_kelvin_min);
          int max_k = id(light_white_kelvin_max);
          if (min_k > max_k) { int tmp = min_k; min_k = max_k; max_k = tmp; }
          if (max_k - min_k < 1) max_k = min_k + 1;
          int step = (max_k - min_k + 119) / 120;
          if (step < 1) step = 1;
          int k = id(light_white_kelvin);
          if (k <= min_k) {
            id(light_white_kelvin) = max_k;
          } else {
            k -= step;
            if (k < min_k) k = min_k;
            id(light_white_kelvin) = k;
          }
      - script.execute: refresh_color_preview

  - id: refresh_color_preview
    then:
      - lambda: |-
          int r8, g8, b8;
          if (id(light_color_picker_mode) == 0) {
            int h = id(light_color_h);
            int hi = (h / 60) % 6;
            float f = h / 60.0f - (int)(h / 60.0f);
            int q = (int)(255.0f * (1.0f - f));
            int t = (int)(255.0f * f);
            switch (hi) {
              case 0: r8=255; g8=t;   b8=0;   break;
              case 1: r8=q;   g8=255; b8=0;   break;
              case 2: r8=0;   g8=255; b8=t;   break;
              case 3: r8=0;   g8=q;   b8=255; break;
              case 4: r8=t;   g8=0;   b8=255; break;
              default: r8=255; g8=0;  b8=q;   break;
            }
            static char hbuf[7];
            snprintf(hbuf, sizeof(hbuf), "%02X%02X%02X", r8, g8, b8);
            lv_label_set_text(id(lbl_hex_val), hbuf);
            lv_label_set_text(id(lbl_cp_mode), "COLOR");
          } else {
            int kelvin = id(light_white_kelvin);
            int min_k = id(light_white_kelvin_min);
            int max_k = id(light_white_kelvin_max);
            if (min_k > max_k) { int tmp = min_k; min_k = max_k; max_k = tmp; }
            if (max_k - min_k < 1) max_k = min_k + 1;
            float temp = kelvin / 100.0f;
            if (temp <= 66.0f) {
              r8 = 255;
              g8 = (int)(99.4708025861f * logf(temp) - 161.1195681661f + 0.5f);
              b8 = temp <= 19.0f ? 0 : (int)(138.5177312231f * logf(temp - 10.0f) - 305.0447927307f + 0.5f);
            } else {
              r8 = (int)(329.698727446f * powf(temp - 60.0f, -0.1332047592f) + 0.5f);
              g8 = (int)(288.1221695283f * powf(temp - 60.0f, -0.0755148492f) + 0.5f);
              b8 = 255;
            }
            r8 = std::max(0, std::min(255, r8));
            g8 = std::max(0, std::min(255, g8));
            b8 = std::max(0, std::min(255, b8));
            static char kbuf[8];
            snprintf(kbuf, sizeof(kbuf), "%dK", kelvin);
            lv_label_set_text(id(lbl_hex_val), kbuf);
            lv_label_set_text(id(lbl_cp_mode), "WHITE");
          }
          lv_color_t col = lv_color_make(r8, g8, b8);
          lv_obj_set_style_bg_color(id(cw_color_circle), col, LV_STATE_DEFAULT);
          lv_obj_set_style_arc_color(id(cp_arc), col, LV_PART_INDICATOR);
          const int luminance = (299 * r8 + 587 * g8 + 114 * b8) / 1000;
          const lv_color_t text_col = luminance >= 150 ? lv_color_hex(0x000000) : lv_color_hex(0xFFFFFF);
          lv_obj_set_style_text_color(id(lbl_hex_val), text_col, LV_STATE_DEFAULT);
          lv_obj_set_style_text_color(id(lbl_cp_mode), text_col, LV_STATE_DEFAULT);
      - lvgl.arc.update:
          id: cp_arc
          value: !lambda |-
            if (id(light_color_picker_mode) == 0) {
              return id(light_color_h);
            }
            int min_k = id(light_white_kelvin_min);
            int max_k = id(light_white_kelvin_max);
            if (min_k > max_k) { int tmp = min_k; min_k = max_k; max_k = tmp; }
            if (max_k - min_k < 1) return 0;
            int kelvin = id(light_white_kelvin);
            if (kelvin < min_k) kelvin = min_k;
            if (kelvin > max_k) kelvin = max_k;
            return (kelvin - min_k) * 359 / (max_k - min_k);

  - id: light_brightness_up
    then:
      - lambda: |-
          int v = id(light_brightness) + 1;
          if (v > 100) v = 100;
          id(light_brightness) = v;
          id(light_requested_brightness) = v;
          id(light_brightness_action_sent) = false;
          id(light_ha_brightness_received_after_send) = false;
          id(light_user_adjusting) = true;
      - script.execute: refresh_light_arc
      - script.execute: queue_light_brightness

  - id: light_brightness_down
    then:
      - lambda: |-
          int v = id(light_brightness) - 1;
          if (v < 0) v = 0;
          id(light_brightness) = v;
          id(light_requested_brightness) = v;
          id(light_brightness_action_sent) = false;
          id(light_ha_brightness_received_after_send) = false;
          id(light_user_adjusting) = true;
      - script.execute: refresh_light_arc
      - script.execute: queue_light_brightness

  - id: refresh_light_arc
    then:
      - lambda: |-
          const bool light_onoff_only =
              !id(light_supports_brightness) &&
              !id(light_supports_rgb) &&
              !id(light_supports_color_temp);

          if (light_onoff_only) {
            lv_obj_add_flag(id(light_arc), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(light_knob_dot), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(lbl_brightness_num), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(lbl_brightness_pct), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(btn_palette), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(btn_dengguang), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(light_title_pill), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(onoff_main_btn), LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_align(id(light_title_pill), LV_ALIGN_CENTER);
            lv_obj_set_x(id(light_title_pill), 0);
            lv_obj_set_y(id(light_title_pill), 79);
            lv_color_t tc = lv_color_make(id(light_color_r), id(light_color_g), id(light_color_b));
            lv_obj_set_style_text_color(id(lbl_light_title), tc, LV_STATE_DEFAULT);
            if (id(light_on)) {
              lv_label_set_text(id(lbl_onoff_state), "ON");
              lv_obj_set_style_bg_color(id(onoff_main_btn), lv_color_hex(0x282729), LV_STATE_DEFAULT);
              lv_obj_set_style_border_color(id(onoff_main_btn), lv_color_hex(0xA98FFF), LV_STATE_DEFAULT);
              lv_obj_set_style_border_width(id(onoff_main_btn), 3, LV_STATE_DEFAULT);
              lv_obj_set_style_shadow_width(id(onoff_main_btn), 12, LV_STATE_DEFAULT);
              lv_obj_set_style_shadow_color(id(onoff_main_btn), lv_color_hex(0xA98FFF), LV_STATE_DEFAULT);
              lv_obj_set_style_shadow_opa(id(onoff_main_btn), LV_OPA_40, LV_STATE_DEFAULT);
              lv_obj_set_style_text_color(id(lbl_onoff_state), lv_color_hex(0xA98FFF), LV_STATE_DEFAULT);
            } else {
              lv_label_set_text(id(lbl_onoff_state), "OFF");
              lv_obj_set_style_bg_color(id(onoff_main_btn), lv_color_hex(0x000000), LV_STATE_DEFAULT);
              lv_obj_set_style_border_color(id(onoff_main_btn), lv_color_hex(0x282729), LV_STATE_DEFAULT);
              lv_obj_set_style_border_width(id(onoff_main_btn), 2, LV_STATE_DEFAULT);
              lv_obj_set_style_shadow_width(id(onoff_main_btn), 8, LV_STATE_DEFAULT);
              lv_obj_set_style_shadow_color(id(onoff_main_btn), lv_color_hex(0x262626), LV_STATE_DEFAULT);
              lv_obj_set_style_shadow_opa(id(onoff_main_btn), LV_OPA_20, LV_STATE_DEFAULT);
              lv_obj_set_style_text_color(id(lbl_onoff_state), lv_color_hex(0x282729), LV_STATE_DEFAULT);
            }
            return;
          }

          lv_obj_add_flag(id(onoff_main_btn), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(light_title_pill), LV_OBJ_FLAG_HIDDEN);
          lv_obj_set_align(id(light_title_pill), LV_ALIGN_TOP_LEFT);
          lv_obj_set_x(id(light_title_pill), 81);
          lv_obj_set_y(id(light_title_pill), 143);

          int pct = id(light_brightness);
          static char buf[4];
          snprintf(buf, sizeof(buf), "%d", pct);
          lv_label_set_text(id(lbl_brightness_num), buf);
          // Center the "N%" pair — no ring collision at any value including 100
          lv_obj_update_layout(id(lbl_brightness_num));
          lv_coord_t nw = lv_obj_get_width(id(lbl_brightness_num));
          int pct_w = 16, gap = 3;
          int pair_x = 120 - (nw + gap + pct_w) / 2;
          lv_obj_set_x(id(lbl_brightness_num), pair_x);
          lv_obj_set_x(id(lbl_brightness_pct), pair_x + nw + gap);
          // Sync ALL theme-coloured elements from globals
          lv_color_t tc = lv_color_make(id(light_color_r), id(light_color_g), id(light_color_b));
          lv_obj_set_style_arc_color(id(light_arc), tc, LV_PART_INDICATOR);
          lv_obj_set_style_text_color(id(lbl_brightness_pct), tc, LV_STATE_DEFAULT);
          lv_obj_set_style_text_color(id(lbl_brightness_num), lv_color_hex(0xFFFFFF), LV_STATE_DEFAULT);
          lv_obj_set_style_border_color(id(btn_palette), tc, LV_STATE_DEFAULT);
          lv_obj_set_style_shadow_color(id(btn_palette), tc, LV_STATE_DEFAULT);
          lv_obj_set_style_text_color(id(lbl_light_title), tc, LV_STATE_DEFAULT);
          if (id(light_supports_rgb) || id(light_supports_color_temp)) lv_obj_clear_flag(id(btn_palette), LV_OBJ_FLAG_HIDDEN);
          else lv_obj_add_flag(id(btn_palette), LV_OBJ_FLAG_HIDDEN);
          if (id(light_supports_brightness)) {
            lv_obj_clear_flag(id(light_arc), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(light_knob_dot), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(lbl_brightness_num), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(lbl_brightness_pct), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(light_arc), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(light_knob_dot), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(lbl_brightness_num), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(lbl_brightness_pct), LV_OBJ_FLAG_HIDDEN);
          }
          // btn_dengguang: 根据light_on决定边框颜色
          if (id(light_on)) {
            lv_obj_set_style_border_color(id(btn_dengguang), tc, LV_STATE_DEFAULT);
            lv_obj_set_style_shadow_color(id(btn_dengguang), tc, LV_STATE_DEFAULT);
          } else {
            lv_obj_set_style_border_color(id(btn_dengguang), lv_color_hex(0x262626), LV_STATE_DEFAULT);
            lv_obj_set_style_shadow_color(id(btn_dengguang), lv_color_hex(0x262626), LV_STATE_DEFAULT);
          }
      - lvgl.arc.update:
          id: light_arc
          value: !lambda "return id(light_brightness);"

