  - file: "gfonts://DM+Sans"
    id: font_menu_center
    size: 21
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz횁횋횒횙횣횥횗찼챕챠처첬체챰0123456789 .-_%/"

  - file: "gfonts://DM+Sans"
